<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./src/style/style.css">
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="main" aria-label="Main">
      <article>
        <section class="card" aria-label="Profile Card">
          <div class="card__img">
            <img
              src="./assets/images/illustration-article.svg"
              alt="Card Image"
              class="img-cover"
            />
          </div>
          <button type="button" class="card__btn">Learning</button>
          <div class="card__date">
            <p class="date">Published 21 Dec 2023</p>
          </div>
          <div class="card__title">
            <a href="#" target="_blank" rel="noopener noreferrer">
              <h1 class="title">HTML & CSS foundations</h1>
            </a>
          </div>
          <div class="card__subtitle">
            <p class="subtitle">
              These languages are the backbone of every website, defining
              structure, content, and presentation.
            </p>
          </div>
          <div class="card__profile">
            <div class="profile__icon" aria-label="Profile Image">
              <a href="#"
                ><img
                  src="./assets/images/image-avatar.webp"
                  alt="Profile image"
                  class="img-cover"
              /></a>
            </div>
            <div class="profile__title" aria-label="Profile Name">
              <p class="profile"><a href="#">Greg Hooper</a></p>
            </div>
          </div>
        </section>
      </article>
    </main>
  </body>
</html>
