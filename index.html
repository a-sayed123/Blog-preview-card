<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./src/style/style.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="main">
      <article class="card">
        <div class="card__img">
          <img
            src="./assets/images/illustration-article.svg"
            alt="Abstract vector illustration for the HTML and CSS foundation article"
            class="img-cover"
          />
        </div>
        <a href="#" class="card__link">Learning</a>
        <div class="card__date">
          Published <time class="date" datetime="2023-12-21">21 Dec 2023</time>
        </div>
        <h1 class="card__title">
          <a href="#" target="_blank" rel="noopener noreferrer">
            HTML & CSS foundations
          </a>
        </h1>
        <div class="card__subtitle">
          <p class="subtitle">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <footer class="card__profile">
          <div class="profile__avatar">
            <a href="#"
              ><img
                src="./assets/images/image-avatar.webp"
                alt="Greg Hooper"
                class="img-cover"
            /></a>
          </div>
          <span class="profile__title"><a href="#">Greg Hooper</a></span>
        </footer>
      </article>
    </main>
  </body>
</html>
